[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
  # adler (unmaintained) — pulled in by png 0.17 → image 0.24 → qrcodegen-image → totp-rs.
  # totp-rs has not updated its image dependency to 0.25 yet. Remove once totp-rs
  # (or qrcodegen-image) upgrades to image ≥0.25, which uses miniz_oxide ≥0.8 (adler2).
  { id = "RUSTSEC-2025-0056", reason = "transitive dep via totp-rs→qrcodegen-image→image 0.24; no upstream fix available yet" },
  # paste (unmaintained, archived by dtolnay) — still pulled in by rav1e (latest, 0.8.1).
  # Remove once rav1e migrates to pastey or a built-in alternative.
  { id = "RUSTSEC-2024-0436", reason = "transitive dep via rav1e 0.8.1; no upstream fix available yet" },
  # rustls-pemfile (unmaintained) — still pulled in transitively by reqwest 0.12.x.
  # No safe upgrade is available until reqwest moves off rustls-pemfile.
  { id = "RUSTSEC-2025-0134", reason = "transitive dep via reqwest 0.12; remove once reqwest no longer depends on rustls-pemfile" },
]

[bans]
# Duplicate versions are common in the transitive graph and too noisy for this audit.
# Keep wildcard dependency bans enabled, but don't emit duplicate-version warnings.
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
  "https://github.com/rust-lang/crates.io-index",
  "sparse+https://index.crates.io/",
]
allow-git = [
  # Temporary reqwest 0.12 compatibility patch for rust-s3 0.37.1.
  # Remove once a fixed crates.io release is available and the patch is dropped.
  "https://github.com/infumap/rust-s3",
]
